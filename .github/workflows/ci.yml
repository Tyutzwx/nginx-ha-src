name: CI Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: 192.168.174.137:8080
  HARBOR_PROJECT: practice-demo
  IMAGE_NAME: nginx-ha
  DEPLOY_REPO: Tyutzwx/argocd-demo-deploy

jobs:
  build-scan-push:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t $REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:${{ env.SHORT_SHA }} .

      - name: Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Run Trivy scan
        run: |
          trivy image \
            --skip-db-update \
            --skip-java-db-update \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format table \
            ${{ env.REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}

      - name: Log in to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Push image to Harbor
        run: docker push $REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:${{ env.SHORT_SHA }}

      - name: Update GitOps deployment repo
        run: |
          git clone https://${{ secrets.REPO_ACCESS_TOKEN }}@github.com/${{ env.DEPLOY_REPO }}.git
          cd argocd-demo-deploy
          sed -i "s|image:.*|image: ${{ env.REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}|" nginx-ha/deployment.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add nginx-ha/deployment.yaml
          git commit -m "ci: update image to ${{ env.SHORT_SHA }}"
          git push
